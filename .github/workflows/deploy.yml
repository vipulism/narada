name: Deploy Narada

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - name: Deploy
        run: |
          cd /opt/stacks/narada
          git pull
          docker compose up -d --build